name: Python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # Until termin-compiler v0.9 is on PyPI, install both packages
        # in one pip invocation. The PEP 508 direct URL pins
        # termin-compiler to the v0.9 work branch (feature/v0.9-presentation
        # — main is still 0.8.1, predating the PresentationProvider
        # Protocol this provider registers against). The setup.py
        # install_requires keeps `termin-compiler>=0.9.0` for the
        # eventual PyPI install path. Doing both installs in one pip
        # command also avoids pip re-resolving the version constraint
        # against PyPI in a later step (which would fail since
        # termin-compiler isn't published yet).
        run: |
          pip install --upgrade pip
          pip install -e ".[test]" "termin-compiler @ git+https://github.com/jamieleigh3d/termin-compiler.git@feature/v0.9-presentation"

      - name: Run pytest
        run: pytest tests_py/ -v
