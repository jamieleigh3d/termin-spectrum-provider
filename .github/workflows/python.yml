name: Python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # v0.9 split the runtime out of termin-compiler into its own
        # termin-server sibling repo. The provider's tests_py/ imports
        # PresentationProvider from termin_core.providers, which travels
        # with termin-server's runtime dependency closure, so all three
        # packages must be installed before pytest collection. PEP 508
        # direct URLs pin to the v0.9 work branches until the family
        # publishes to PyPI. setup.py install_requires keeps the same
        # version constraints for the eventual PyPI install path.
        run: |
          pip install --upgrade pip
          pip install -e ".[test]" \
            "termin-core @ git+https://github.com/jamieleigh3d/termin-core.git@feature/v0.9" \
            "termin-server @ git+https://github.com/jamieleigh3d/termin-server.git@feature/v0.9" \
            "termin-compiler @ git+https://github.com/jamieleigh3d/termin-compiler.git@feature/v0.9-presentation"

      - name: Run pytest
        run: pytest tests_py/ -v
