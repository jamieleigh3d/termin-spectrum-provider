name: Python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install termin-compiler from main
        # Until termin-compiler v0.9 is on PyPI, install from GitHub.
        # Once published, this step collapses to `pip install termin-compiler>=0.9`.
        run: |
          pip install --upgrade pip
          pip install "git+https://github.com/jamieleigh3d/termin-compiler.git@main"

      - name: Install this package (editable, with test extras)
        run: pip install -e ".[test]"

      - name: Run pytest
        run: pytest tests_py/ -v
